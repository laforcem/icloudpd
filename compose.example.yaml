services:
  icloudpd:
    image: ghcr.io/laforcem/icloudpd:latest
    configs:
      - source: icloudpd_config
        target: /etc/icloudpd/config.yaml
    secrets:
      - icloud_password_you
      - icloud_password_partner
    volumes:
      - ./data:/data

configs:
  icloudpd_config:
    file: ./config.example.yaml

secrets:
  icloud_password_you:
    file: ./secrets/you.txt
  icloud_password_partner:
    file: ./secrets/partner.txt
