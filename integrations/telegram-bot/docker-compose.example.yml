secrets:
  telegram_bot_token:
    file: ./secrets/telegram_bot_token.txt
  telegram_allowed_chat_ids:
    file: ./secrets/telegram_allowed_chat_ids.txt
  icloudpd_webui_external_url:
    file: ./secrets/icloudpd_webui_external_url.txt

services:
  icloudpd:
    image: ghcr.io/laforcem/icloudpd:latest
    command:
      - "--mfa-provider"
      - "webui"
      - "--watch-with-interval"
      - "3600"
      - "--username"
      - "jdoe@icloud.com"
      - "--directory"
      - "/data"
      - "--notification-forwarder"
    volumes:
      - ./data:/data
      - ./config:/home/icloudpd/.pyicloud
    networks:
      - icloudpd-net

  icloudpd-telegram-bot:
    image: ghcr.io/laforcem/icloudpd-telegram-bot:latest
    environment:
      TELEGRAM_BOT_TOKEN_FILE: /run/secrets/telegram_bot_token
      TELEGRAM_ALLOWED_CHAT_IDS_FILE: /run/secrets/telegram_allowed_chat_ids
      ICLOUDPD_BASE_URL: "http://icloudpd:2011"
      # Optional: browser-reachable WebUI URL, for a deep-link button when a
      # session refresh needs a human at the password prompt. Distinct from
      # ICLOUDPD_BASE_URL above (that one's container-internal).
      # ICLOUDPD_WEBUI_EXTERNAL_URL_FILE: /run/secrets/icloudpd_webui_external_url
    secrets:
      - telegram_bot_token
      - telegram_allowed_chat_ids
      # - icloudpd_webui_external_url
    networks:
      - icloudpd-net

networks:
  icloudpd-net:
    driver: bridge
