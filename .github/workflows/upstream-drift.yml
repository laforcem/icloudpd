name: Upstream Drift Check

on:
  schedule:
    - cron: '0 13 * * 1'  # every Monday 13:00 UTC
  workflow_dispatch:

jobs:
  check-drift:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch upstream and count commits behind
        id: drift
        run: |
          git remote add upstream https://github.com/icloud-photos-downloader/icloud_photos_downloader.git
          git fetch upstream master
          behind=$(git rev-list --count HEAD..upstream/master)
          echo "behind=$behind" >> "$GITHUB_OUTPUT"

      - name: Open or update tracking issue
        if: steps.drift.outputs.behind != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BEHIND: ${{ steps.drift.outputs.behind }}
        run: |
          existing=$(gh issue list --label upstream-drift --state open --json number --jq '.[0].number')
          body="Fork is $BEHIND commit(s) behind \`upstream/master\` as of $(date -u +%Y-%m-%d)."
          if [ -n "$existing" ]; then
            gh issue edit "$existing" --body "$body"
          else
            gh issue create --title "Upstream drift: $BEHIND commits behind" --body "$body" --label upstream-drift
          fi

      - name: Close tracking issue if caught up
        if: steps.drift.outputs.behind == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          existing=$(gh issue list --label upstream-drift --state open --json number --jq '.[0].number')
          if [ -n "$existing" ]; then
            gh issue close "$existing" --comment "Caught up with upstream/master."
          fi
