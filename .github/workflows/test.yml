name: Test

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install locales for tests
        run: sudo apt-get update && sudo apt-get -y install locales locales-all

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install test dependencies
        run: >
          python3 -m pip install --disable-pip-version-check -r requirements-pip.txt &&
          pip3 install --disable-pip-version-check . --group test

      - name: Test
        run: scripts/test

  docker-build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: icloudpd:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test image
        run: docker run --rm icloudpd:ci-test --version
